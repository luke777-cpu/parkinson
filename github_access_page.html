<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub 접속 페이지</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #0d1117, #161b22);
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      background: #21262d;
      padding: 40px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      text-align: center;
      width: 90%;
      max-width: 420px;
    }
    .logo {
      font-size: 54px;
      margin-bottom: 10px;
    }
    h1 {
      margin: 10px 0;
      font-size: 30px;
    }
    p {
      color: #c9d1d9;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    a.button {
      display: block;
      text-decoration: none;
      color: white;
      background: #238636;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      margin: 12px 0;
      transition: 0.2s;
    }
    a.button:hover {
      background: #2ea043;
      transform: translateY(-2px);
    }
    a.secondary {
      background: #30363d;
    }
    a.secondary:hover {
      background: #484f58;
    }
    .small {
      margin-top: 24px;
      font-size: 13px;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🐙</div>
    <h1>GitHub 접속</h1>
    <p>
      아래 버튼을 누르면 GitHub 홈페이지 또는 로그인 페이지로 바로 이동합니다.
    </p>

    <a class="button" href="https://github.com" target="_blank">GitHub 홈페이지 열기</a>
    <a class="button secondary" href="https://github.com/login" target="_blank">GitHub 로그인</a>
    <a class="button secondary" href="https://github.com/new" target="_blank">새 저장소 만들기</a>

    <div class="small">이 파일을 바탕화면에 저장해 두면 바로가기처럼 사용할 수 있습니다.</div>
  </div>
</body>
</html>
