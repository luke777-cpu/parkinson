<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1FA971">
<title>약효일지 · ON·OFF 기록</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#F5F7FA; --surface:#FFFFFF; --surface-2:#EEF2F6; --ink:#15212E; --ink-2:#516072;
  --line:#DCE3EB; --accent:#1FA971; --accent-ink:#0C7A52;
  --on:#1FA971; --off:#54657A; --signal:#5C93D6; --partial:#E0A030;
  --dysk:#E8663C; --dyst:#8A6BBF; --wearoff:#C98A4B; --wake:#8A97A6;
  --shadow:0 1px 2px rgba(21,33,46,.06),0 6px 18px rgba(21,33,46,.06);
  --radius:18px; --tap:64px;
}
[data-theme="dark"]{
  --bg:#0E151D; --surface:#16202B; --surface-2:#1E2A37; --ink:#E8EEF4; --ink-2:#9DB0C2;
  --line:#27333F; --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 18px rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.45;
  -webkit-font-smoothing:antialiased; font-size:17px;
  padding-bottom:calc(78px + env(safe-area-inset-bottom));
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
h1,h2,h3{margin:0; font-weight:800; letter-spacing:-.02em}
.wrap{max-width:560px; margin:0 auto; padding:0 16px}
.app-head{position:sticky; top:0; z-index:20; background:color-mix(in srgb,var(--bg) 86%, transparent); backdrop-filter:blur(10px); padding:14px 0 10px; border-bottom:1px solid var(--line)}
.app-head .wrap{display:flex; align-items:center; justify-content:space-between; gap:12px}
.brand{display:flex; align-items:baseline; gap:10px}
.brand .mark{font-size:20px; font-weight:900; letter-spacing:-.04em}
.brand .mark b{color:var(--on)} .brand .mark i{font-style:normal; color:var(--off)}
.brand .date{font-size:13px; color:var(--ink-2); font-variant-numeric:tabular-nums}
.icon-btn{width:42px; height:42px; border-radius:12px; display:grid; place-items:center; background:var(--surface); box-shadow:var(--shadow); font-size:18px}

section.tab{display:none; padding-top:16px} section.tab.active{display:block; animation:fade .25s ease}
@keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}

/* current state hero */
.now-card{background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px; margin-bottom:14px}
.now-row{display:flex; align-items:center; gap:14px}
.now-dot{width:54px; height:54px; border-radius:16px; flex:0 0 auto; box-shadow:inset 0 0 0 1px rgba(0,0,0,.05)}
.now-label{font-size:13px; color:var(--ink-2); font-weight:600}
.now-state{font-size:26px; font-weight:900; letter-spacing:-.03em; line-height:1.1}
.now-since{font-size:13px; color:var(--ink-2); margin-top:2px; font-variant-numeric:tabular-nums}

/* ribbon */
.ribbon-card{background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px 18px 12px; margin-bottom:14px}
.card-title{font-size:13px; font-weight:700; color:var(--ink-2); text-transform:none; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center}
.ribbon{position:relative; height:34px; border-radius:8px; overflow:hidden; background:var(--surface-2); border:1px solid var(--line)}
.ribbon .seg{position:absolute; top:0; bottom:0}
.ribbon .medmark{position:absolute; top:-3px; width:2px; height:40px; background:var(--ink); opacity:.55}
.ribbon-axis{display:flex; justify-content:space-between; font-size:11px; color:var(--ink-2); margin-top:5px; font-variant-numeric:tabular-nums}
.ribbon-empty{font-size:13px; color:var(--ink-2); text-align:center; padding:6px 0}

/* state buttons */
.grid-title{font-size:14px; font-weight:700; color:var(--ink-2); margin:4px 2px 10px}
.state-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px}
.state-btn{min-height:var(--tap); border-radius:16px; background:var(--surface); box-shadow:var(--shadow); display:flex; align-items:center; gap:12px; padding:0 16px; font-size:18px; font-weight:700; transition:transform .08s ease; border:1px solid transparent}
.state-btn:active{transform:scale(.96)}
.state-btn .sw{width:18px; height:18px; border-radius:6px; flex:0 0 auto}
.state-btn small{display:block; font-size:11px; font-weight:600; color:var(--ink-2); margin-top:1px}
.med-btn{width:100%; min-height:58px; border-radius:16px; margin-top:12px; background:var(--ink); color:var(--bg); font-size:18px; font-weight:800; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:var(--shadow)}
[data-theme="dark"] .med-btn{background:var(--accent); color:#04130C}

.today-list{margin-top:16px}
.evrow{display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--line)}
.evrow:last-child{border-bottom:none}
.evrow .t{font-size:15px; font-weight:700; font-variant-numeric:tabular-nums; width:54px; flex:0 0 auto}
.evrow .b{flex:1; min-width:0}
.evrow .b .s{font-weight:700; font-size:15px}
.evrow .b .m{font-size:13px; color:var(--ink-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.evrow .pill{font-size:12px; font-weight:700; padding:3px 9px; border-radius:999px; color:#fff}
.evrow .del{color:var(--ink-2); font-size:18px; padding:6px}

/* generic cards / kpi */
.kpi-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:14px}
.kpi{background:var(--surface); border-radius:14px; box-shadow:var(--shadow); padding:14px}
.kpi .n{font-size:26px; font-weight:900; letter-spacing:-.03em; font-variant-numeric:tabular-nums}
.kpi .l{font-size:12px; color:var(--ink-2); font-weight:600; margin-top:2px}
.kpi .n small{font-size:14px; font-weight:700; color:var(--ink-2)}

.daycard{background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin-bottom:12px}
.daycard h3{font-size:16px; margin-bottom:4px} .daycard .sub{font-size:12px; color:var(--ink-2); margin-bottom:12px; font-variant-numeric:tabular-nums}
.bars{display:flex; flex-direction:column; gap:7px}
.bar{display:flex; align-items:center; gap:8px; font-size:12px}
.bar .lab{width:74px; flex:0 0 auto; color:var(--ink-2); font-weight:600}
.bar .track{flex:1; height:14px; background:var(--surface-2); border-radius:7px; overflow:hidden}
.bar .fill{height:100%; border-radius:7px}
.bar .val{width:48px; text-align:right; font-variant-numeric:tabular-nums; font-weight:700}

/* trend chart */
.chart-card{background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin-bottom:14px}
.legend{display:flex; flex-wrap:wrap; gap:12px; font-size:12px; color:var(--ink-2); margin-top:8px}
.legend span{display:inline-flex; align-items:center; gap:5px}
.legend i{width:11px; height:11px; border-radius:3px; display:inline-block}

/* settings / meds */
.list-card{background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:6px 16px; margin-bottom:14px}
.li{display:flex; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line)}
.li:last-child{border-bottom:none}
.li .grow{flex:1; min-width:0}
.li .name{font-weight:700} .li .meta{font-size:13px; color:var(--ink-2)}
.section-label{font-size:13px; font-weight:800; color:var(--ink-2); margin:18px 2px 8px; letter-spacing:.02em}
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:50px; padding:0 18px; border-radius:13px; font-weight:800; font-size:16px; background:var(--surface-2); color:var(--ink); width:100%; box-shadow:var(--shadow)}
.btn.primary{background:var(--accent); color:#04130C}
.btn.ghost{background:transparent; box-shadow:none; border:1px solid var(--line)}
.btn.danger{background:transparent; color:var(--dysk); box-shadow:none; border:1px solid color-mix(in srgb,var(--dysk) 40%,transparent)}
.btn-row{display:flex; gap:10px; margin-bottom:10px}

.disclaimer{font-size:12.5px; color:var(--ink-2); background:var(--surface-2); border-radius:12px; padding:12px 14px; line-height:1.5}
.disclaimer b{color:var(--ink)}

/* bottom nav */
.nav{position:fixed; left:0; right:0; bottom:0; z-index:30; background:color-mix(in srgb,var(--surface) 92%,transparent); backdrop-filter:blur(12px); border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom)}
.nav .wrap{display:flex; justify-content:space-around; padding:0}
.nav button{flex:1; padding:9px 0 7px; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--ink-2); font-size:11px; font-weight:700}
.nav button .ic{font-size:21px; line-height:1}
.nav button.active{color:var(--accent)}

/* sheet / modal */
.scrim{position:fixed; inset:0; background:rgba(8,14,20,.45); z-index:50; display:none; align-items:flex-end; justify-content:center}
.scrim.open{display:flex; animation:fade .2s ease}
.sheet{background:var(--surface); width:100%; max-width:560px; border-radius:22px 22px 0 0; padding:18px 18px calc(20px + env(safe-area-inset-bottom)); box-shadow:0 -8px 30px rgba(0,0,0,.2); max-height:88vh; overflow:auto; animation:slideup .26s cubic-bezier(.2,.8,.2,1)}
@keyframes slideup{from{transform:translateY(40px)} to{transform:none}}
.sheet h2{font-size:19px; margin-bottom:4px}
.sheet .hint{font-size:13px; color:var(--ink-2); margin-bottom:16px}
.field{margin-bottom:14px} .field label{display:block; font-size:13px; font-weight:700; color:var(--ink-2); margin-bottom:6px}
.field input,.field select,.field textarea{width:100%; font-size:16px; font-family:inherit; padding:12px 14px; border:1.5px solid var(--line); border-radius:12px; background:var(--surface); color:var(--ink)}
.field textarea{min-height:64px; resize:vertical}
.slider-row{display:flex; align-items:center; gap:12px}
.slider-row input[type=range]{flex:1; accent-color:var(--accent)}
.slider-row .v{width:46px; text-align:right; font-weight:800; font-variant-numeric:tabular-nums}
.chips{display:flex; flex-wrap:wrap; gap:8px}
.chip{padding:10px 14px; border-radius:999px; background:var(--surface-2); font-weight:700; font-size:15px; border:1.5px solid transparent}
.chip.sel{border-color:var(--accent); background:color-mix(in srgb,var(--accent) 14%,transparent); color:var(--accent-ink)}
[data-theme="dark"] .chip.sel{color:#9af0c8}
.toast{position:fixed; left:50%; bottom:calc(92px + env(safe-area-inset-bottom)); transform:translateX(-50%); background:var(--ink); color:var(--bg); padding:11px 18px; border-radius:999px; font-weight:700; font-size:14px; z-index:60; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; white-space:nowrap}
.toast.show{opacity:1; transform:translateX(-50%) translateY(-4px)}
.empty{text-align:center; color:var(--ink-2); padding:40px 20px; font-size:15px}
.empty .big{font-size:34px; margin-bottom:10px}

/* report / print */
.report{background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px}
.report h2{font-size:20px; margin-bottom:2px} .report .rmeta{font-size:13px; color:var(--ink-2); margin-bottom:16px}
.report table{width:100%; border-collapse:collapse; font-size:13px; margin:8px 0 4px; font-variant-numeric:tabular-nums}
.report th,.report td{border:1px solid var(--line); padding:6px 8px; text-align:center}
.report th{background:var(--surface-2); font-weight:800}
.report .rsec{font-size:14px; font-weight:800; margin:18px 0 8px}
.qitem{display:flex; gap:10px; align-items:flex-start; padding:8px 0; border-bottom:1px solid var(--line)}
.qitem input{margin-top:4px}
.qitem .qx{color:var(--ink-2); padding:2px 6px}
@media print{
  body{background:#fff; color:#000; padding:0; font-size:12px}
  .app-head,.nav,.no-print{display:none!important}
  section.tab{display:none!important} #tab-report{display:block!important; padding:0}
  .wrap{max-width:none; padding:0}
  .report{box-shadow:none; border-radius:0; padding:0}
  .report th{background:#eee!important; -webkit-print-color-adjust:exact; print-color-adjust:exact}
  .ribbon .seg,.bar .fill{-webkit-print-color-adjust:exact; print-color-adjust:exact}
}
</style>
</head>
<body>

<header class="app-head">
  <div class="wrap">
    <div class="brand">
      <div class="mark"><b>약효</b><i>일지</i></div>
      <div class="date" id="headDate"></div>
    </div>
    <button class="icon-btn" id="themeBtn" aria-label="화면 밝기 전환">◐</button>
  </div>
</header>

<main class="wrap">

  <!-- TODAY -->
  <section class="tab active" id="tab-today">
    <div class="now-card">
      <div class="now-row">
        <div class="now-dot" id="nowDot" style="background:var(--wake)"></div>
        <div>
          <div class="now-label">현재 상태</div>
          <div class="now-state" id="nowState">기록 없음</div>
          <div class="now-since" id="nowSince">상태 버튼을 눌러 시작하세요</div>
        </div>
      </div>
    </div>

    <div class="ribbon-card">
      <div class="card-title"><span>오늘 흐름</span><span id="ribbonRange"></span></div>
      <div class="ribbon" id="ribbon"><div class="ribbon-empty" id="ribbonEmpty">아직 오늘 기록이 없어요</div></div>
      <div class="ribbon-axis"><span>6시</span><span>10시</span><span>14시</span><span>18시</span><span>22시</span></div>
    </div>

    <div class="grid-title">지금 상태 기록 — 누르면 현재 시각으로 저장</div>
    <div class="state-grid" id="stateGrid"></div>
    <button class="med-btn" id="medBtn">💊 약 먹음</button>

    <div class="today-list" id="todayList"></div>
  </section>

  <!-- LOG -->
  <section class="tab" id="tab-log">
    <div class="btn-row no-print">
      <button class="btn ghost" id="addPastBtn">+ 지난 기록 직접 추가</button>
    </div>
    <div id="logBody"></div>
  </section>

  <!-- TREND -->
  <section class="tab" id="tab-trend">
    <div class="kpi-grid" id="kpiGrid"></div>
    <div class="chart-card">
      <div class="card-title"><span>최근 추이 (분/일)</span><span id="trendRange"></span></div>
      <div id="trendChart"></div>
      <div class="legend">
        <span><i style="background:var(--on)"></i>ON</span>
        <span><i style="background:var(--partial)"></i>불완전ON</span>
        <span><i style="background:var(--off)"></i>OFF</span>
        <span><i style="background:var(--dysk)"></i>이상운동</span>
      </div>
    </div>
    <div id="dayCards"></div>
  </section>

  <!-- REPORT -->
  <section class="tab" id="tab-report">
    <div class="btn-row no-print">
      <select id="repRange" class="btn" style="font-weight:700">
        <option value="7">최근 7일</option>
        <option value="14" selected>최근 14일</option>
        <option value="30">최근 30일</option>
      </select>
      <button class="btn primary" id="printBtn">🖨 인쇄 / PDF</button>
    </div>
    <div class="report" id="reportBody"></div>
  </section>

  <!-- SETTINGS -->
  <section class="tab" id="tab-set">
    <div class="section-label">내 약 목록</div>
    <div class="list-card" id="medList"></div>
    <button class="btn ghost no-print" id="addMedBtn" style="margin-bottom:8px">+ 약 추가</button>

    <div class="section-label">데이터</div>
    <div class="btn-row">
      <button class="btn" id="exportBtn">⬇ 백업 내보내기</button>
      <button class="btn" id="importBtn">⬆ 불러오기</button>
    </div>
    <input type="file" id="importFile" accept="application/json" style="display:none">

    <div class="section-label">화면</div>
    <div class="list-card">
      <div class="li"><div class="grow"><div class="name">어두운 화면</div></div><button class="btn ghost" id="darkToggle" style="width:auto">전환</button></div>
    </div>

    <div class="section-label">안내</div>
    <div class="disclaimer">
      <b>약효일지는 증상과 약효 패턴을 기록·관찰하는 도구입니다.</b> 의학적 진단이나 처방을 대체하지 않습니다.
      약물 용량·복용 간격 조정은 반드시 주치의와 상의하세요. 모든 기록은 이 기기 안에만 저장되며, 다른 곳으로 전송되지 않습니다.
    </div>
    <button class="btn danger no-print" id="resetBtn" style="margin-top:14px">모든 기록 삭제</button>
    <div style="text-align:center; color:var(--ink-2); font-size:12px; margin:18px 0 8px">약효일지 · v1.0</div>
  </section>

</main>

<nav class="nav">
  <div class="wrap">
    <button data-tab="today" class="active"><span class="ic">🏠</span>오늘</button>
    <button data-tab="log"><span class="ic">📋</span>기록</button>
    <button data-tab="trend"><span class="ic">📈</span>추이</button>
    <button data-tab="report"><span class="ic">🩺</span>보고서</button>
    <button data-tab="set"><span class="ic">⚙️</span>설정</button>
  </div>
</nav>

<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ---------- model ---------- */
const STATES = [
  {key:"wake",    ko:"기상",      hint:"하루 시작", color:"#8A97A6"},
  {key:"off",     ko:"OFF",       hint:"약효 없음", color:"#54657A"},
  {key:"signal",  ko:"신호",      hint:"약효 오는 느낌", color:"#5C93D6"},
  {key:"on",      ko:"ON",        hint:"잘 움직임", color:"#1FA971"},
  {key:"partial", ko:"불완전 ON", hint:"될 듯 말 듯", color:"#E0A030"},
  {key:"dysk",    ko:"이상운동",  hint:"dyskinesia", color:"#E8663C"},
  {key:"dyst",    ko:"근긴장",    hint:"dystonia·발가락", color:"#8A6BBF"},
  {key:"wearoff", ko:"약효 빠짐", hint:"wearing off", color:"#C98A4B"},
];
const SMAP = Object.fromEntries(STATES.map(s=>[s.key,s]));
const MED_PRESETS = ["마도파","마도파 HBS","시네메트","시네메트 CR","스타레보","퍼킨","온젠티스(엔타카폰)","아질렉트","미라펙스","리큅","아만타딘","컴탄"];
const KEY = "yakhyo_log_v1";

let db = load();
function load(){
  try{ const d = JSON.parse(localStorage.getItem(KEY)); if(d&&d.events) return d; }catch(e){}
  return { events:[], meds:[], questions:defaultQuestions(), settings:{theme:"light"} };
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(db)); }catch(e){ toast("저장 공간이 부족합니다"); } }
function defaultQuestions(){ return [
  "아침에 ON이 늦게 오는 문제를 줄일 방법이 있을지",
  "이상운동(dyskinesia)이 생기는 시간대 조절 방법",
  "불완전 ON 상태를 어떻게 봐야 할지",
  "약효가 급하게 오르내리지 않게 하는 방법",
].map(t=>({t,done:false})); }

/* ---------- helpers ---------- */
const pad=n=>String(n).padStart(2,"0");
const dkey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayKey=()=>dkey(new Date());
function hm(ts){const d=new Date(ts); return `${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function minOfDay(ts){const d=new Date(ts); return d.getHours()*60+d.getMinutes();}
function fmtDur(m){ if(m<=0) return "0분"; const h=Math.floor(m/60),mm=Math.round(m%60); return h? `${h}시간 ${mm}분` : `${mm}분`; }
function fmtDateK(k){ const[a,b,c]=k.split("-"); const wd=["일","월","화","수","목","금","토"][new Date(k).getDay()]; return `${+b}월 ${+c}일 (${wd})`; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

/* ---------- event ops ---------- */
function addState(key, extra={}){
  const ts = extra.ts || Date.now();
  db.events.push({ id:uid(), type:"state", state:key, ts,
    output:extra.output??null, gait:extra.gait??null, dysk:extra.dysk??null, dyst:extra.dyst??null, memo:extra.memo||"" });
  db.events.sort((a,b)=>a.ts-b.ts); save(); renderAll();
  toast(`${SMAP[key].ko} 기록됨 · ${hm(ts)}`);
}
function addMed(name, dose, ts){
  db.events.push({ id:uid(), type:"med", drug:name, dose:dose||null, ts:ts||Date.now(), memo:"" });
  db.events.sort((a,b)=>a.ts-b.ts); save(); renderAll();
  toast(`${name}${dose?(" "+dose+"mg"):""} 복약 기록됨`);
}
function delEvent(id){ db.events = db.events.filter(e=>e.id!==id); save(); renderAll(); }

/* ---------- aggregation (state intervals within a day) ---------- */
function byDay(){
  const map={};
  for(const e of db.events){ const k=dkey(new Date(e.ts)); (map[k]||(map[k]=[])).push(e); }
  for(const k in map) map[k].sort((a,b)=>a.ts-b.ts);
  return map;
}
function summarize(events){
  // state intervals: each state lasts until the next STATE event same day
  const states = events.filter(e=>e.type==="state");
  const meds = events.filter(e=>e.type==="med");
  const dur = {}; STATES.forEach(s=>dur[s.key]=0);
  for(let i=0;i<states.length;i++){
    const cur=states[i], next=states[i+1];
    const end = next ? next.ts : endOfDayCap(cur.ts);
    dur[cur.state]+= Math.max(0,(end-cur.ts)/60000);
  }
  const firstMed = meds.length? meds[0].ts : null;
  const firstOn  = states.find(s=>s.state==="on");
  const latency = (firstMed && firstOn) ? Math.round((firstOn.ts-firstMed)/60000) : null;
  const outs = states.map(s=>s.output).filter(v=>v!=null);
  const dyskCount = states.filter(s=>s.state==="dysk").length;
  return {
    dur, latency,
    firstMed, firstOn: firstOn?firstOn.ts:null,
    maxOut: outs.length? Math.max(...outs):null,
    avgOut: outs.length? Math.round(outs.reduce((a,b)=>a+b,0)/outs.length):null,
    dyskCount, meds
  };
}
function endOfDayCap(ts){ // cap interval at "now" if today, else 23:00 of that day
  const d=new Date(ts);
  if(dkey(d)===todayKey()) return Math.min(Date.now(), new Date(d.getFullYear(),d.getMonth(),d.getDate(),23,30).getTime());
  return new Date(d.getFullYear(),d.getMonth(),d.getDate(),23,0).getTime();
}

function renderRibbon(events){
  const rb=document.getElementById("ribbon"); const empty=document.getElementById("ribbonEmpty");
  rb.querySelectorAll(".seg,.medmark").forEach(n=>n.remove());
  const states=events.filter(e=>e.type==="state");
  const range=document.getElementById("ribbonRange");
  if(!states.length){ empty.style.display="block"; range.textContent=""; return; }
  empty.style.display="none";
  const START=6*60, END=23*60, SPAN=END-START;
  const clamp=v=>Math.max(0,Math.min(1,(v-START)/SPAN));
  for(let i=0;i<states.length;i++){
    const cur=states[i], next=states[i+1];
    const a=minOfDay(cur.ts);
    const bEnd = next? minOfDay(next.ts) : (dkey(new Date(cur.ts))===todayKey()? minOfDay(Date.now()) : END);
    const L=clamp(a), R=clamp(bEnd); if(R<=L) continue;
    const seg=document.createElement("div"); seg.className="seg";
    seg.style.left=(L*100)+"%"; seg.style.width=((R-L)*100)+"%"; seg.style.background=SMAP[cur.state].color;
    rb.appendChild(seg);
  }
  events.filter(e=>e.type==="med").forEach(m=>{
    const x=clamp(minOfDay(m.ts)); const mk=document.createElement("div"); mk.className="medmark"; mk.style.left=(x*100)+"%"; rb.appendChild(mk);
  });
  range.textContent=`${hm(states[0].ts)} ~ 지금`;
}

/* ---------- render: TREND ---------- */
function renderTrend(){
  const days=byDay(); const keys=Object.keys(days).sort();
  const kpi=document.getElementById("kpiGrid"); const chart=document.getElementById("trendChart"); const cards=document.getElementById("dayCards");
  if(!keys.length){ kpi.innerHTML=""; chart.innerHTML=""; cards.innerHTML=`<div class="empty"><div class="big">📈</div>기록이 쌓이면 추이가 보여요.</div>`; document.getElementById("trendRange").textContent=""; return; }
  const sums=keys.map(k=>({k, s:summarize(days[k])}));
  const recent=sums.slice(-14);
  document.getElementById("trendRange").textContent=`${recent.length}일`;
  // KPI averages over recent
  const avg=(f)=>{ const a=recent.map(f).filter(v=>v!=null); return a.length? Math.round(a.reduce((x,y)=>x+y,0)/a.length):null; };
  const kON=avg(d=>d.s.dur.on), kOFF=avg(d=>d.s.dur.off), kDY=avg(d=>d.s.dur.dysk), kLat=avg(d=>d.s.latency);
  kpi.innerHTML=`
    ${kpiCard(kON==null?"–":fmtShort(kON),"평균 ON 시간")}
    ${kpiCard(kLat==null?"–":kLat+"<small>분</small>","평균 ON까지(아침)")}
    ${kpiCard(kOFF==null?"–":fmtShort(kOFF),"평균 OFF 시간")}
    ${kpiCard(kDY==null?"–":kDY+"<small>분</small>","평균 이상운동")}`;
  // stacked bar chart (ON / partial / off / dysk minutes)
  chart.innerHTML=buildChart(recent);
  // day cards
  cards.innerHTML="";
  [...sums].reverse().slice(0,14).forEach(({k,s})=>{
    const tot=Math.max(1, s.dur.on+s.dur.partial+s.dur.off+s.dur.dysk);
    const bar=(lab,v,col)=>`<div class="bar"><div class="lab">${lab}</div><div class="track"><div class="fill" style="width:${Math.min(100,v/tot*100)}%;background:${col}"></div></div><div class="val">${Math.round(v)}분</div></div>`;
    const c=document.createElement("div"); c.className="daycard";
    c.innerHTML=`<h3>${fmtDateK(k)}</h3>
      <div class="sub">첫 ON ${s.firstOn?hm(s.firstOn):"–"} · ON까지 ${s.latency!=null?s.latency+"분":"–"} · 최고출력 ${s.maxOut??"–"} · 이상운동 ${s.dyskCount}회</div>
      <div class="bars">
        ${bar("ON",s.dur.on,"var(--on)")}
        ${bar("불완전ON",s.dur.partial,"var(--partial)")}
        ${bar("OFF",s.dur.off,"var(--off)")}
        ${bar("이상운동",s.dur.dysk,"var(--dysk)")}
      </div>`;
    cards.appendChild(c);
  });
}
function kpiCard(n,l){ return `<div class="kpi"><div class="n">${n}</div><div class="l">${l}</div></div>`; }
function fmtShort(m){ const h=Math.floor(m/60),mm=Math.round(m%60); return h?`${h}<small>시간</small>${mm?` ${mm}<small>분</small>`:""}`:`${mm}<small>분</small>`; }
function buildChart(recent){
  const W=Math.max(recent.length*34, 220), H=150, pad=18, base=H-24, maxV=Math.max(60, ...recent.map(d=>d.s.dur.on+d.s.dur.partial+d.s.dur.off+d.s.dur.dysk));
  const bw=Math.min(24,(W-pad*2)/recent.length-6);
  let bars="";
  recent.forEach((d,i)=>{
    const x=pad+i*((W-pad*2)/recent.length)+((W-pad*2)/recent.length-bw)/2;
    let y=base; const segs=[["on","var(--on)"],["partial","var(--partial)"],["off","var(--off)"],["dysk","var(--dysk)"]];
    segs.forEach(([key,col])=>{ const v=d.s.dur[key]; const h=v/maxV*(base-10); if(h>0){ y-=h; bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${h}" fill="${col}" rx="1.5"/>`; } });
    const lab=d.k.slice(5).replace("-","/");
    bars+=`<text x="${x+bw/2}" y="${base+13}" font-size="9" fill="var(--ink-2)" text-anchor="middle">${lab}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">${bars}</svg>`;
}

  const avg=(f)=>{ const a=rows.map(f).filter(v=>v!=null); return a.length? Math.round(a.reduce((x,y)=>x+y,0)/a.length):null; };
  const aLat=avg(d=>d.s.latency), aON=avg(d=>d.s.dur.on), aOFF=avg(d=>d.s.dur.off), aPart=avg(d=>d.s.dur.partial), aDy=avg(d=>d.s.dur.dysk);
  const medList = db.meds.length? db.meds.map(m=>`${escapeHtml(m.name)}${m.dose?` ${m.dose}mg`:""}${m.note?` (${escapeHtml(m.note)})`:""}`).join(" · ") : "등록된 약 없음 (설정에서 추가)";

  body.innerHTML=`
    <h2>파킨슨 약효·운동변동 기록</h2>
    <div class="rmeta">기간: ${start} ~ ${end} · 총 ${keys.length}일</div>
    <div class="rsec">복용 약물</div><div style="font-size:13px">${medList}</div>
    <div class="rsec">기간 요약 (하루 평균)</div>
    <div style="font-size:13.5px; line-height:1.7">
      · 아침 ON까지 평균 <b>${aLat!=null?aLat+"분":"–"}</b><br>
      · ON 시간 평균 <b>${aON!=null?fmtDur(aON):"–"}</b> / 불완전 ON <b>${aPart!=null?fmtDur(aPart):"–"}</b><br>
      · OFF 시간 평균 <b>${aOFF!=null?fmtDur(aOFF):"–"}</b> · 이상운동 평균 <b>${aDy!=null?aDy+"분":"–"}</b>
    </div>
    <div class="rsec">날짜별 기록 (분 단위)</div>${tbl}
    <div class="rsec">주치의에게 묻고 싶은 것</div>${q}
    <button class="btn ghost no-print" onclick="addQ()" style="margin-top:8px">+ 질문 추가</button>
    <div class="rsec">참고</div>

}

      <select id="p_kind"><option value="state">상태</option><option value="med">복약</option></select></div>
    <div class="field" id="p_state_f"><label>상태</label><select id="p_state">${sOpts}</select></div>
    <div class="field" id="p_med_f" style="display:none"><label>약 이름</label><input id="p_drug" placeholder="약 이름"><div style="height:8px"></div><input id="p_dose" type="number" placeholder="용량 mg (선택)"></div>
    <div class="field"><label>메모 (선택)</label><input id="p_memo"></div>
    <div class="btn-row"><button class="btn ghost" onclick="closeSheet()">취소</button><button class="btn primary" id="p_save">추가</button></div>`);
  document.getElementById("p_kind").onchange=function(){
    const m=this.value==="med"; document.getElementById("p_med_f").style.display=m?"block":"none"; document.getElementById("p_state_f").style.display=m?"none":"block";
  };
  document.getElementById("p_save").onclick=()=>{
    const d=document.getElementById("p_date").value, t=document.getElementById("p_time").value;
    if(!d||!t){ toast("날짜와 시각을 입력하세요"); return; }
    const ts=new Date(`${d}T${t}`).getTime(); const memo=document.getElementById("p_memo").value.trim();
    if(document.getElementById("p_kind").value==="med"){
      const drug=document.getElementById("p_drug").value.trim(); if(!drug){ toast("약 이름을 입력하세요"); return; }
      db.events.push({id:uid(),type:"med",drug,dose:(+document.getElementById("p_dose").value)||null,ts,memo});
    } else {
      db.events.push({id:uid(),type:"state",state:document.getElementById("p_state").value,ts,output:null,gait:null,dysk:null,dyst:null,memo});
    }
    db.events.sort((a,b)=>a.ts-b.ts); save(); closeSheet(); renderAll(); toast("기록 추가됨");
  };
}

/* ---------- nav + misc ---------- */
function switchTab(name){
  document.querySelectorAll("section.tab").forEach(s=>s.classList.toggle("active",s.id==="tab-"+name));
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===name));
  if(name==="log") renderLog(); if(name==="trend") renderTrend(); if(name==="report") renderReport(); if(name==="set") renderMeds();
  window.scrollTo(0,0);
}
document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
document.getElementById("medBtn").onclick=openMedSheet;
document.getElementById("addMedBtn").onclick=()=>openAddMed(false);
document.getElementById("addPastBtn").onclick=openAddPast;
document.getElementById("printBtn").onclick=()=>window.print();
document.getElementById("repRange").onchange=renderReport;

let toastT;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1900); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* theme */
function applyTheme(){ document.documentElement.setAttribute("data-theme", db.settings.theme==="dark"?"dark":"light"); }
function toggleTheme(){ db.settings.theme = db.settings.theme==="dark"?"light":"dark"; save(); applyTheme(); }
document.getElementById("themeBtn").onclick=toggleTheme;
document.getElementById("darkToggle").onclick=toggleTheme;

/* backup */
document.getElementById("exportBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`약효일지_백업_${todayKey()}.json`; a.click(); URL.revokeObjectURL(a.href); toast("백업 파일을 저장했어요");
};
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange=function(){
  const f=this.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d.events) throw 0;
    if(confirm("현재 기록을 불러온 데이터로 덮어쓸까요?")){ db=Object.assign({questions:defaultQuestions(),settings:{theme:db.settings.theme},meds:[]},d); save(); applyTheme(); renderAll(); switchTab("today"); toast("불러왔어요"); } }
    catch(e){ toast("올바른 백업 파일이 아니에요"); } };
  r.readAsText(f); this.value="";
};
document.getElementById("resetBtn").onclick=()=>{
  if(confirm("모든 기록과 약 목록이 삭제됩니다. 계속할까요?")){ localStorage.removeItem(KEY); db=load(); applyTheme(); renderAll(); switchTab("today"); toast("초기화했어요"); }
};

/* ---------- boot ---------- */
function renderAll(){ renderToday();
  if(document.getElementById("tab-log").classList.contains("active")) renderLog();
  if(document.getElementById("tab-trend").classList.contains("active")) renderTrend();
  if(document.getElementById("tab-report").classList.contains("active")) renderReport();
  if(document.getElementById("tab-set").classList.contains("active")) renderMeds();
}
function setHeadDate(){ const d=new Date(); const wd=["일","월","화","수","목","금","토"][d.getDay()];
  document.getElementById("headDate").textContent=`${d.getMonth()+1}.${d.getDate()} (${wd})`; }

applyTheme(); setHeadDate(); renderAll();

/* first-run disclaimer */
if(!db.settings.seen){
  setTimeout(()=>openSheet(`
    <h2>약효일지에 오신 걸 환영해요</h2>
    <div class="hint" style="margin-bottom:14px">하루 동안의 ON·OFF·이상운동을 한 번의 터치로 기록하고, 진료 때 보여줄 자료로 정리해 드려요.</div>
    <div class="disclaimer" style="margin-bottom:16px"><b>이 앱은 증상·약효를 기록하는 도구예요.</b> 진단이나 처방을 대신하지 않으며, 약 조정은 반드시 주치의와 상의하세요. 기록은 이 기기에만 저장돼요.</div>
    <button class="btn primary" id="okStart">시작하기</button>`),400);
  document.addEventListener("click",function once(e){ if(e.target&&e.target.id==="okStart"){ db.settings.seen=true; save(); closeSheet(); document.removeEventListener("click",once);} });
}

/* PWA */
if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
</script>
</body>
</html>
